name: 可观测性 / 运维需求
description: 请求监控、用量导出、健康检查、备份、成本治理、采集可靠性等需求
title: "[Ops]: "
labels: ["enhancement", "needs-triage"]

body:
  - type: markdown
    attributes:
      value: |
        这个模板适合请求监控、用量分析、成本治理、健康检查、备份维护、collector 可靠性、导出和诊断报告等运维类需求。

  - type: dropdown
    id: observability-scenario
    attributes:
      label: 可观测性场景
      description: 这个需求最接近哪类场景？
      options:
        - 请求监控 / Request Events
        - 用量分析 / 成本分析
        - Provider / 模型健康检查
        - 认证文件 / 配额 / 账号健康
        - Usage Collector / 队列可靠性
        - 导出 / 诊断报告 / 脱敏
        - 备份 / 维护 / 数据保留
        - 系统健康检查 / Doctor
        - 其他
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: 当前无法回答的问题
      description: 你希望通过这个能力看清什么？例如失败原因、成本归因、额度状态、队列积压、备份状态。
      placeholder: 例如：我无法判断某段时间内失败请求主要来自哪个 Provider 和模型。
    validations:
      required: true

  - type: checkboxes
    id: dimensions
    attributes:
      label: 需要支持的筛选 / 聚合维度
      options:
        - label: 时间范围
        - label: API Key / 调用方
        - label: AI 提供商 / Provider
        - label: 模型
        - label: 认证文件 / Auth File
        - label: 账号
        - label: 项目 / Project
        - label: 成本
        - label: Token / 用量
        - label: 配额 / Quota
        - label: 失败原因 / 错误类型
        - label: Header / 响应元数据
        - label: 队列 / Collector 状态

  - type: textarea
    id: data-source
    attributes:
      label: 数据来源
      description: 这些信息来自哪里？可以是请求监控事件、CPA usage queue、Provider API、response headers、SQLite、外部接口等。
      placeholder: 例如：来自 CPA usage queue 中的 usage events，以及 response header 中的 quota 信息。
    validations:
      required: true

  - type: textarea
    id: expected-output
    attributes:
      label: 期望展示 / 导出结果
      description: 你希望看到什么页面、字段、图表、导出格式或诊断结论？
      placeholder: 例如：按当前筛选条件导出 CSV，包含时间、Provider、模型、API Key、失败原因、成本，且不包含 raw_json。
    validations:
      required: true

  - type: textarea
    id: scale
    attributes:
      label: 数据规模 / 性能背景
      description: 如果知道，请提供事件量、时间窗口、刷新频率、数据库大小或导出规模。
      placeholder: 例如：每天约 10 万条 usage events，希望导出最近 7 天失败请求。
    validations:
      required: false

  - type: checkboxes
    id: privacy
    attributes:
      label: 安全与隐私
      options:
        - label: 结果中不能包含 CPA Management Key、API Key、token 或账号敏感信息
          required: true
        - label: 如果涉及导出或诊断报告，需要明确脱敏字段
          required: false

  - type: textarea
    id: acceptance
    attributes:
      label: 期望验收结果
      description: 什么情况下你会认为这个需求已经完成？请尽量写成可验证结果。
    validations:
      required: true

  - type: checkboxes
    id: checklist
    attributes:
      label: 检查清单
      options:
        - label: 我已经搜索过现有 Issues，没有找到重复需求
          required: true
        - label: 我已经确认敏感信息已经脱敏，例如 token、key、账号信息
          required: true
