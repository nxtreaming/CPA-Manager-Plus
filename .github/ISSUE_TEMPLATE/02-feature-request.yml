name: 功能需求
description: 新功能、优化建议、使用体验改进
title: "[Feature]: "
labels: ["enhancement", "needs-triage"]

body:
  - type: markdown
    attributes:
      value: |
        请尽量描述真实使用场景，而不是只写“希望支持 xxx”。

  - type: dropdown
    id: area
    attributes:
      label: 影响页面 / 模块
      description: 这个需求主要影响哪里？
      options:
        - 请求监控
        - 用量分析 / 成本分析
        - AI 提供商
        - 认证文件 / 配额 / 巡检
        - API Key / 调用方管理
        - 配置中心
        - 部署 / Manager Server
        - 备份 / 维护
        - README / 文档 / 增长展示
        - 不确定 / 其他
    validations:
      required: true

  - type: textarea
    id: scenario
    attributes:
      label: 使用场景
      description: 你在什么情况下需要这个功能？
      placeholder: 例如：我有多个 CPA 实例，希望在一个 CPA Manager Plus 中统一查看请求统计。
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: 当前痛点
      description: 现在没有这个功能时，你是怎么处理的？哪里不方便？
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 期望方案
      description: 你希望 CPA Manager Plus 怎么实现？
    validations:
      required: true

  - type: checkboxes
    id: dimensions
    attributes:
      label: 关注的数据维度
      description: 如果这个需求涉及统计、筛选、展示、额度或导出，请勾选相关维度。
      options:
        - label: API Key / 调用方
        - label: AI 提供商 / Provider
        - label: 模型
        - label: 认证文件 / Auth File
        - label: 账号
        - label: 项目 / Project
        - label: 时间范围
        - label: 成本
        - label: Token / 用量
        - label: 配额 / Quota
        - label: 失败原因 / 错误类型
        - label: 不涉及这些维度

  - type: textarea
    id: acceptance
    attributes:
      label: 期望验收结果
      description: 什么情况下你会认为这个需求已经完成？请尽量写成可验证结果。
      placeholder: 例如：当供应商能返回模型列表但真实请求失败时，测活结果应显示不可用，并提示失败原因。
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: 需求优先级
      options:
        - 很高：影响主要使用流程
        - 中等：明显提升体验
        - 较低：锦上添花
    validations:
      required: true

  - type: textarea
    id: extra
    attributes:
      label: 补充信息
      description: 截图、竞品参考、相关链接等。
    validations:
      required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: 检查清单
      options:
        - label: 我已经搜索过现有 Issues，没有找到重复需求
          required: true
