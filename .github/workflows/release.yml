name: Build and Release

on:
  push:
    tags:
      - 'v*'
      - '*-alpha*'
      - '*-beta*'
      - '*-rc*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.x'
          cache-dependency-path: apps/manager-server/go.sum

      - name: Install dependencies
        run: npm ci

      - name: Build all-in-one HTML
        run: npm run build
        env:
          VERSION: ${{ github.ref_name }}

      - name: Check demo isolation
        run: npm run check:demo-isolation

      - name: Build native release packages
        run: bin/release/package-native.sh
        env:
          VERSION: ${{ github.ref_name }}

      - name: Prepare release assets
        run: |
          cd apps/web/dist
          mv index.html management.html
          ls -lh management.html

      - name: Generate release notes
        run: |
          set -euo pipefail
          current_tag="${GITHUB_REF_NAME}"
          notes_dir="docs/release-notes"

          # Prefer curated notes: docs/release-notes/<tag>-<lang>.md (zh -> zh-CN -> en)
          primary=""
          for lang in zh zh-CN en; do
            if [ -f "${notes_dir}/${current_tag}-${lang}.md" ]; then
              primary="${notes_dir}/${current_tag}-${lang}.md"
              break
            fi
          done

          if [ -n "${primary}" ]; then
            cp "${primary}" release-notes.md
            echo "Using curated release notes: ${primary}"
          else
            # Fallback: auto-list commits in range (legacy behavior)
            previous_tag="$(git tag --list 'v*' --sort=-v:refname | grep -v "^${current_tag}$" | head -n 1 || true)"
            if [ -n "${previous_tag}" ]; then
              range="${previous_tag}..${current_tag}"
            else
              range="${current_tag}"
            fi

            : > release-notes.md
            git log --pretty=format:"- %h %s" "${range}" >> release-notes.md
            echo "Looked for: ${notes_dir}/${current_tag}-{zh,zh-CN,en}.md"
            echo "No curated notes for ${current_tag}; fell back to git log"
          fi

      - name: Detect release type
        id: release_type
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF_NAME}" == *-* ]]; then
            echo "prerelease=true" >> "${GITHUB_OUTPUT}"
          else
            echo "prerelease=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            apps/web/dist/management.html
            dist/native/*
          body_path: release-notes.md
          draft: false
          prerelease: ${{ steps.release_type.outputs.prerelease }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-and-push-docker:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    env:
      DOCKERHUB_IMAGE: seakee/cpa-manager-plus
      GHCR_IMAGE: ghcr.io/seakee/cpa-manager-plus

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Detect Docker release type
        id: release_type
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([-+][0-9A-Za-z.-]+)?$ ]]; then
            echo "semver=true" >> "${GITHUB_OUTPUT}"
          else
            echo "semver=false" >> "${GITHUB_OUTPUT}"
          fi

          if [[ "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "stable=true" >> "${GITHUB_OUTPUT}"
          else
            echo "stable=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Prepare Docker publish targets
        id: docker_targets
        run: |
          set -euo pipefail
          if [ "${DOCKERHUB_IMAGE}" != "seakee/cpa-manager-plus" ]; then
            echo "Docker image name must be seakee/cpa-manager-plus" >&2
            exit 1
          fi

          images="${GHCR_IMAGE}"
          dockerhub_enabled=false
          if [ -n "${DOCKERHUB_USERNAME}" ] && [ -n "${DOCKERHUB_TOKEN}" ]; then
            images="${images}"$'\n'"${DOCKERHUB_IMAGE}"
            dockerhub_enabled=true
          else
            echo "::warning::DOCKERHUB_USERNAME and DOCKERHUB_TOKEN are not both configured; DockerHub publish will be skipped."
          fi

          if [ "${dockerhub_enabled}" = "true" ] && [ "${DOCKERHUB_IMAGE}" != "seakee/cpa-manager-plus" ]; then
            echo "DockerHub image name must be seakee/cpa-manager-plus" >&2
            exit 1
          fi

          {
            echo "images<<EOF"
            echo "${images}"
            echo "EOF"
            echo "dockerhub_enabled=${dockerhub_enabled}"
          } >> "${GITHUB_OUTPUT}"
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        if: steps.docker_targets.outputs.dockerhub_enabled == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.docker_targets.outputs.images }}
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}},enable=${{ steps.release_type.outputs.semver == 'true' }}
            type=semver,pattern={{major}}.{{minor}},enable=${{ steps.release_type.outputs.stable == 'true' }}
            type=raw,value=latest,enable=${{ steps.release_type.outputs.stable == 'true' }}
          labels: |
            org.opencontainers.image.title=CPA Manager Plus
            org.opencontainers.image.description=CPA Manager Plus Manager Server container image
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.url=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.documentation=${{ github.server_url }}/${{ github.repository }}#readme

      - name: Build and push Manager Server image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.manager-server
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ github.ref_name }}

      - name: Update DockerHub overview
        if: steps.docker_targets.outputs.dockerhub_enabled == 'true'
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ env.DOCKERHUB_IMAGE }}
          short-description: CPA Manager Plus with Dockerized Manager Server
          readme-filepath: ./README.md

  notify-telegram:
    name: Notify Telegram
    needs:
      - build-and-release
      - build-and-push-docker
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout release source
        uses: actions/checkout@v4

      - name: Send Telegram release notification
        shell: bash
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_MESSAGE_THREAD_ID: ${{ secrets.TELEGRAM_MESSAGE_THREAD_ID }}
        run: |
          set -euo pipefail

          release_post="docs/release-posts/${GITHUB_REF_NAME}-telegram.html"

          if [ -z "${TELEGRAM_BOT_TOKEN}" ] || [ -z "${TELEGRAM_CHAT_ID}" ]; then
            echo "::warning::TELEGRAM_BOT_TOKEN or TELEGRAM_CHAT_ID is not configured; Telegram notification skipped."
            exit 0
          fi

          if [ ! -f "${release_post}" ]; then
            echo "::warning::Telegram release post ${release_post} was not found; notification skipped."
            exit 0
          fi

          validation_error="$(python3 - "${release_post}" <<'PY' 2>&1 || true
          import sys
          from html.parser import HTMLParser
          from pathlib import Path
          from urllib.parse import urlparse

          path = Path(sys.argv[1])
          body = path.read_text(encoding="utf-8")

          if not body.strip():
              raise SystemExit("release post is empty")
          if len(body) > 3500:
              raise SystemExit(f"release post is {len(body)} characters; maximum is 3500")

          class TelegramHTMLValidator(HTMLParser):
              allowed_tags = {"b", "i", "code", "a"}

              def __init__(self):
                  super().__init__(convert_charrefs=False)
                  self.stack = []

              def handle_starttag(self, tag, attrs):
                  if tag not in self.allowed_tags:
                      raise ValueError(f"unsupported HTML tag: <{tag}>")
                  if tag == "a":
                      if len(attrs) != 1 or attrs[0][0] != "href":
                          raise ValueError("<a> must contain only one href attribute")
                      url = urlparse(attrs[0][1])
                      if url.scheme != "https" or not url.netloc:
                          raise ValueError("<a href> must use an absolute HTTPS URL")
                  elif attrs:
                      raise ValueError(f"<{tag}> does not support attributes")
                  self.stack.append(tag)

              def handle_endtag(self, tag):
                  if not self.stack or self.stack[-1] != tag:
                      raise ValueError(f"unbalanced closing tag: </{tag}>")
                  self.stack.pop()

              def handle_startendtag(self, tag, attrs):
                  raise ValueError(f"self-closing tag is not supported: <{tag}/>")

          validator = TelegramHTMLValidator()
          try:
              validator.feed(body)
              validator.close()
              if validator.stack:
                  raise ValueError(f"unclosed HTML tag: <{validator.stack[-1]}>")
          except ValueError as error:
              raise SystemExit(str(error)) from error
          PY
          )"

          if [ -n "${validation_error}" ]; then
            echo "::warning::Telegram release post validation failed: ${validation_error}"
            exit 0
          fi

          if [ -n "${TELEGRAM_MESSAGE_THREAD_ID}" ] && ! [[ "${TELEGRAM_MESSAGE_THREAD_ID}" =~ ^[0-9]+$ ]]; then
            echo "::warning::TELEGRAM_MESSAGE_THREAD_ID must be numeric; Telegram notification skipped."
            exit 0
          fi

          release_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/releases/tag/${GITHUB_REF_NAME}"

          reply_markup="$(python3 - "${release_url}" <<'PY'
          import json
          import sys

          print(json.dumps({
              "inline_keyboard": [
                  [{"text": "查看 Release", "url": sys.argv[1]}],
              ]
          }, ensure_ascii=False, separators=(",", ":")))
          PY
          )"

          response_file="$(mktemp)"
          curl_args=(
            --silent
            --show-error
            --retry 3
            --retry-all-errors
            --connect-timeout 10
            --max-time 30
            --output "${response_file}"
            --write-out "%{http_code}"
            --request POST
            "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage"
            --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}"
            --data-urlencode "text@${release_post}"
            --data-urlencode "parse_mode=HTML"
            --data-urlencode "disable_web_page_preview=true"
            --data-urlencode "reply_markup=${reply_markup}"
          )

          if [ -n "${TELEGRAM_MESSAGE_THREAD_ID}" ]; then
            curl_args+=(--data-urlencode "message_thread_id=${TELEGRAM_MESSAGE_THREAD_ID}")
          fi

          set +e
          http_code="$(curl "${curl_args[@]}")"
          curl_status=$?
          set -e

          if [ "${curl_status}" -ne 0 ]; then
            echo "::warning::Telegram API request failed before receiving an HTTP response."
            exit 0
          fi

          if ! [[ "${http_code}" =~ ^2[0-9][0-9]$ ]]; then
            echo "::warning::Telegram API returned HTTP ${http_code}; release remains successful."
            exit 0
          fi

          if ! python3 - "${response_file}" <<'PY'
          import json
          import sys
          from pathlib import Path

          try:
              response = json.loads(Path(sys.argv[1]).read_text(encoding="utf-8"))
          except (OSError, UnicodeDecodeError, json.JSONDecodeError):
              raise SystemExit(1)

          raise SystemExit(0 if response.get("ok") is True else 1)
          PY
          then
            echo "::warning::Telegram API did not confirm message delivery; release remains successful."
            exit 0
          fi

          echo "Telegram release notification sent successfully."
